query ObtenerPerfilCompleto($id: UUID!) @auth(level: PUBLIC, insecureReason: "Fetch full user profile including level and avatar for home dashboard") {
  usuario(id: $id) {
    id
    alias
    nombre
    apellidoPaterno
    apellidoMaterno
    estadoValidacion
    estrellasPrestigio
    rachaActualDias
    numeroCelular
    curso
    paralelo
    nombreColegio
    horaNotificacion
    rol {
      id
      nombreRol
    }
    ultimaActividad
    nivel {
      id
      nombreRango
      jerarquia
      estrellasRequeridas
      limitePalabrasTarjeta
    }
    avatar {
      id
      imagenUrl
      descripcion
    }
  }
}

query ObtenerLeaderboard @auth(level: PUBLIC, insecureReason: "Leaderboard is public for all users.") {
  usuarios(orderBy: [{estrellasPrestigio: DESC}, {rachaActualDias: DESC}], limit: 5) {
    id
    alias
    estrellasPrestigio
    rachaActualDias
    avatar {
      imagenUrl
    }
    logroNotificados_on_usuario(limit: 3) {
      insignia {
        iconoRef
        nombreVisible
      }
    }
  }
}

query ObtenerRankingUsuario($misEstrellas: Int!) @auth(level: PUBLIC, insecureReason: "Aggregate counts for ranking are public.") {
  usuarios(where: {estrellasPrestigio: {gt: $misEstrellas}}) {
    id
  }
}

query ObtenerUsuarioPorCredenciales($numeroCelular: String!, $nombre: String!, $apellidoPaterno: String!) @auth(level: PUBLIC, insecureReason: "Auth implementation for login via fixed credentials.") {
  usuarios(where: {
    numeroCelular: {eq: $numeroCelular},
    nombre: {eq: $nombre},
    apellidoPaterno: {eq: $apellidoPaterno}
  }, limit: 1) {
    id
    alias
    avatar {
      imagenUrl
    }
  }
}

query ObtenerContenidoArchivo($idArchivo: UUID!) @auth(level: PUBLIC, insecureReason: "Safe to fetch learning material") {
  archivo(id: $idArchivo) {
    id
    titulo
    tema
    descripcion
    fechaCreacion
    imagenUrl
    autorOriginal
    licencia
    tarjetas_on_archivo(orderBy: [{ordenSecuencia: ASC}]) {
      id
      ordenSecuencia
      contenidoTexto
      tipoFondo
      dataFondo
    }
    cuestionarios_on_archivo {
      id
      tituloQuiz
      preguntas_on_cuestionario {
        id
        enunciado
        respuestas_on_pregunta {
          id
          textoOpcion
          esCorrecta
        }
      }
    }
  }
}

query ObtenerEstructuraLimpiezaArchivo($archivoId: UUID!) @auth(level: PUBLIC, insecureReason: "Cascade delete helper") {
  archivo(id: $archivoId) {
    cuestionarios_on_archivo {
      id
      preguntas_on_cuestionario {
        id
      }
    }
  }
}

mutation RegistrarIntentoExamen($usuarioId: UUID!, $archivoId: UUID!, $calificacionObtenida: Int!, $fechaIntento: Timestamp!, $completadoExitosamente: Boolean!) @auth(level: PUBLIC, insecureReason: "Safe for auth tracking") {
  intento_insert(data: {usuarioId: $usuarioId, archivoId: $archivoId, calificacionObtenida: $calificacionObtenida, fechaIntento: $fechaIntento, completadoExitosamente: $completadoExitosamente})
}

mutation ActualizarEstrellasUsuario($id: UUID!, $nuevasEstrellas: Int!) @auth(level: PUBLIC, insecureReason: "Safe for point updates") {
  usuario_update(id: $id, data: {estrellasPrestigio: $nuevasEstrellas})
}

query ListarNiveles @auth(level: PUBLIC, insecureReason: "Levels are public data for progression logic") {
  nivels(orderBy: [{jerarquia: ASC}]) {
    id
    nombreRango
    jerarquia
    estrellasRequeridas
    limitePalabrasTarjeta
  }
}

mutation ActualizarNivelUsuario($id: UUID!, $nivelId: UUID!) @auth(level: PUBLIC, insecureReason: "Safe for level update") {
  usuario_update(id: $id, data: {nivelId: $nivelId})
}

query ListarTodasInsignias @auth(level: PUBLIC, insecureReason: "Badge catalog is public") {
  insignias {
    id
    nombreVisible
    descripcion
    iconoRef
    condicionDesbloqueo
  }
}

query ObtenerInsigniasNotificadas($usuarioId: UUID!) @auth(level: PUBLIC, insecureReason: "Safe for badge tracking") {
  logroNotificados(where: { usuarioId: { eq: $usuarioId } }) {
    insignia {
      id
      condicionDesbloqueo
    }
  }
}

query ContarIntentosUsuario($usuarioId: UUID!) @auth(level: PUBLIC, insecureReason: "Safe for badge evaluation") {
  intentos(where: { usuarioId: { eq: $usuarioId } }) {
    id
    archivoId
    completadoExitosamente
  }
}

query ContarArchivosCompletadosDistintos($usuarioId: UUID!) @auth(level: PUBLIC, insecureReason: "Safe for badge evaluation") {
  intentos(where: {
    usuarioId: { eq: $usuarioId },
    completadoExitosamente: { eq: true }
  }) {
    archivoId
  }
}

mutation RegistrarLogroNotificado($usuarioId: UUID!, $insigniaId: UUID!, $fecha: Timestamp!) @auth(level: PUBLIC, insecureReason: "Safe badge notification tracking") {
  logroNotificado_insert(data: {
    usuarioId: $usuarioId,
    insigniaId: $insigniaId,
    fechaNotificacion: $fecha
  })
}

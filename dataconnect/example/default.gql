

query ObtenerPanelSolicitudes @auth(level: PUBLIC, insecureReason: "Safe for admin panel querying") {
  solicitudValidacions(where: {estado: {eq: "PENDIENTE"}}) {
    id
    usuario {
      nombre
      apellidoPaterno
    }
  }
}

mutation CrearSolicitudValidacion($usuarioId: UUID!, $rolSolicitadoId: UUID!, $fechaEnvio: Timestamp!) @auth(level: PUBLIC, insecureReason: "Safe for registration flow") {
  solicitudValidacion_insert(data: {usuarioId: $usuarioId, rolSolicitadoId: $rolSolicitadoId, estado: "PENDIENTE", fechaEnvio: $fechaEnvio})
}

query ListarArchivosPublicos @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public") {
  archivos(orderBy: [{fechaCreacion: DESC}]) {
    id
    titulo
    descripcion
    fechaCreacion
    imagenUrl
    nivelRequerido {
      nombreRango
    }
    espacio {
      nombreEspacio
    }
    usuario {
      alias
    }
  }
}

mutation CrearUsuarioNuevo($alias: String!, $nombre: String!, $apellidoPaterno: String!, $apellidoMaterno: String!, $estadoValidacion: Boolean!, $estrellasPrestigio: Int!, $rachaActualDias: Int!, $numeroCelular: String!, $rolId: UUID!, $ultimaActividad: Timestamp!, $curso: String, $paralelo: String, $nombreColegio: String, $avatarId: UUID, $nivelId: UUID, $horaNotificacion: String) @auth(level: PUBLIC, insecureReason: "Safe for custom user registration during development") {
  usuario_insert(data: {alias: $alias, nombre: $nombre, apellidoPaterno: $apellidoPaterno, apellidoMaterno: $apellidoMaterno, estadoValidacion: $estadoValidacion, estrellasPrestigio: $estrellasPrestigio, rachaActualDias: $rachaActualDias, numeroCelular: $numeroCelular, rolId: $rolId, ultimaActividad: $ultimaActividad, curso: $curso, paralelo: $paralelo, nombreColegio: $nombreColegio, horaNotificacion: $horaNotificacion, avatarId: $avatarId, nivelId: $nivelId})
}

mutation ActualizarUsuarioPerfil($id: UUID!, $alias: String!, $nombre: String!, $apellidoPaterno: String!, $apellidoMaterno: String!, $numeroCelular: String!, $curso: String, $paralelo: String, $nombreColegio: String, $rolId: UUID!, $avatarId: UUID, $horaNotificacion: String) @auth(level: PUBLIC, insecureReason: "Safe for custom user update") {
  usuario_update(id: $id, data: {alias: $alias, nombre: $nombre, apellidoPaterno: $apellidoPaterno, apellidoMaterno: $apellidoMaterno, numeroCelular: $numeroCelular, curso: $curso, paralelo: $paralelo, nombreColegio: $nombreColegio, rolId: $rolId, avatarId: $avatarId, horaNotificacion: $horaNotificacion})
}

mutation ActualizarRachaUsuario($id: UUID!, $racha: Int!, $ultimaActividad: Timestamp!) @auth(level: PUBLIC, insecureReason: "Safe for user action tracking") {
  usuario_update(id: $id, data: {rachaActualDias: $racha, ultimaActividad: $ultimaActividad})
}

query ListarRoles @auth(level: PUBLIC, insecureReason: "Roles are public to show in registration") {
  rolUsuarios {
    id
    nombreRol
  }
}

mutation SeedRolesData @auth(level: PUBLIC, insecureReason: "Seed data for development") {
  rolUsuario_insertMany(data: [
    { nombreRol: "Estudiante" },
    { nombreRol: "Docente" }
  ])
}

query ObtenerUsuarioPorId($id: UUID!) @auth(level: USER, insecureReason: "It is acceptable for logged-in users to fetch public profiles of other users.") {
  usuario(id: $id) {
    id
    alias
    nombre
    apellidoPaterno
    apellidoMaterno
    estadoValidacion
    estrellasPrestigio
    rachaActualDias
    numeroCelular
    rol {
      id
      nombreRol
    }
    ultimaActividad
  }
}

query ListarAvatares @auth(level: PUBLIC, insecureReason: "Avatars are public assets available for selection by anyone.") {
  opcionAvatars {
    id
    imagenUrl
    descripcion
  }
}

mutation SeedOpcionAvatarData @auth(level: PUBLIC, insecureReason: "Seed data is for development purposes only") {
  opcionAvatar_insertMany(data: [
    {
      imagenUrl: "https://api.dicebear.com/7.x/bottts/png?seed=1",
      descripcion: "Avatar con sombrero"
    },
    {
      imagenUrl: "https://api.dicebear.com/7.x/bottts/png?seed=2",
      descripcion: "Avatar con gafas"
    },
    {
      imagenUrl: "https://api.dicebear.com/7.x/bottts/png?seed=3",
      descripcion: "Avatar con capa"
    }
  ])
}

query ObtenerPerfilCompleto($id: UUID!) @auth(level: PUBLIC, insecureReason: "Fetch full user profile including level and avatar for home dashboard") {
  usuario(id: $id) {
    id
    alias
    nombre
    apellidoPaterno
    apellidoMaterno
    estadoValidacion
    estrellasPrestigio
    rachaActualDias
    numeroCelular
    curso
    paralelo
    nombreColegio
    horaNotificacion
    rol {
      id
      nombreRol
    }
    ultimaActividad
    nivel {
      id
      nombreRango
      estrellasRequeridas
      limitePalabrasTarjeta
    }
    avatar {
      id
      imagenUrl
      descripcion
    }
  }
}

query ObtenerLeaderboard @auth(level: PUBLIC, insecureReason: "Leaderboard is public for all users.") {
  usuarios(orderBy: [{estrellasPrestigio: DESC}, {rachaActualDias: DESC}], limit: 5) {
    id
    alias
    estrellasPrestigio
    rachaActualDias
    avatar {
      imagenUrl
    }
    logroNotificados_on_usuario(limit: 3) {
      insignia {
        iconoRef
        nombreVisible
      }
    }
  }
}

query ObtenerRankingUsuario($misEstrellas: Int!) @auth(level: PUBLIC, insecureReason: "Aggregate counts for ranking are public.") {
  usuarios(where: {estrellasPrestigio: {gt: $misEstrellas}}) {
    id
  }
}

query ObtenerUsuarioPorCredenciales($numeroCelular: String!, $nombre: String!, $apellidoPaterno: String!) @auth(level: PUBLIC, insecureReason: "Auth implementation for login via fixed credentials.") {
  usuarios(where: {
    numeroCelular: {eq: $numeroCelular},
    nombre: {eq: $nombre},
    apellidoPaterno: {eq: $apellidoPaterno}
  }, limit: 1) {
    id
    alias
    avatar {
      imagenUrl
    }
  }
}
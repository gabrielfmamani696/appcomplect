

query ObtenerPanelSolicitudes @auth(level: PUBLIC, insecureReason: "Safe for admin panel querying") {
  solicitudValidacions(where: {estado: {eq: "PENDIENTE"}}) {
    id
    usuario {
      nombre
      apellidoPaterno
    }
  }
}

mutation CrearSolicitudValidacion($usuarioId: UUID!, $rolSolicitadoId: UUID!, $fechaEnvio: Timestamp!) @auth(level: PUBLIC, insecureReason: "Safe for registration flow") {
  solicitudValidacion_insert(data: {usuarioId: $usuarioId, rolSolicitadoId: $rolSolicitadoId, estado: "PENDIENTE", fechaEnvio: $fechaEnvio})
}

query ListarArchivosPublicos @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public") {
  archivos(orderBy: [{fechaCreacion: DESC}]) {
    id
    titulo
    tema
    descripcion
    fechaCreacion
    imagenUrl
    autorOriginal
    licencia
    nivelRequerido {
      nombreRango
      jerarquia
      estrellasRequeridas
      id
    }
    espacio {
      nombreEspacio
    }
    usuario {
      id
      alias
      rol {
        nombreRol
      }
    }
  }
}

query ObtenerArchivoParaEdicion($id: UUID!) @auth(level: PUBLIC, insecureReason: "Load publication metadata for editing") {
  archivo(id: $id) {
    id
    titulo
    tema
    descripcion
    imagenUrl
    autorOriginal
    licencia
    usuario {
      id
    }
  }
}

mutation CrearArchivoDivulgacion($titulo: String!, $tema: String!, $descripcion: String!, $fechaCreacion: Timestamp!, $imagenUrl: String, $usuarioId: UUID!, $nivelRequeridoId: UUID, $autorOriginal: String @retired, $licencia: String @retired) @auth(level: PUBLIC, insecureReason: "Student publication create") {
  archivo_insert(data: {
    titulo: $titulo
    tema: $tema
    descripcion: $descripcion
    fechaCreacion: $fechaCreacion
    imagenUrl: $imagenUrl
    usuarioId: $usuarioId
    nivelRequeridoId: $nivelRequeridoId
  })
}

mutation ActualizarArchivoDivulgacion($id: UUID!, $titulo: String!, $tema: String!, $descripcion: String!, $imagenUrl: String, $autorOriginal: String @retired, $licencia: String @retired) @auth(level: PUBLIC, insecureReason: "Student publication update") {
  archivo_update(id: $id, data: { titulo: $titulo, tema: $tema, descripcion: $descripcion, imagenUrl: $imagenUrl })
}

mutation EliminarArchivo($id: UUID!) @auth(level: PUBLIC, insecureReason: "Student publication delete") {
  archivo_delete(id: $id)
}

mutation EliminarTarjetasDeArchivo($archivoId: UUID!) @auth(level: PUBLIC, insecureReason: "Student publication cleanup") {
  tarjeta_deleteMany(where: { archivoId: { eq: $archivoId } })
}

mutation EliminarCuestionariosDeArchivo($archivoId: UUID!) @auth(level: PUBLIC, insecureReason: "Student publication cleanup") {
  cuestionario_deleteMany(where: { archivoId: { eq: $archivoId } })
}

mutation EliminarPreguntasDeCuestionario($cuestionarioId: UUID!) @auth(level: PUBLIC, insecureReason: "Student publication cleanup") {
  pregunta_deleteMany(where: { cuestionarioId: { eq: $cuestionarioId } })
}

mutation EliminarRespuestasDePregunta($preguntaId: UUID!) @auth(level: PUBLIC, insecureReason: "Student publication cleanup") {
  respuesta_deleteMany(where: { preguntaId: { eq: $preguntaId } })
}

mutation AgregarTarjetaArchivo($archivoId: UUID!, $ordenSecuencia: Int!, $contenidoTexto: String!, $tipoFondo: String!, $dataFondo: String!) @auth(level: PUBLIC, insecureReason: "Student publication cards") {
  tarjeta_insert(data: {
    archivoId: $archivoId
    ordenSecuencia: $ordenSecuencia
    contenidoTexto: $contenidoTexto
    tipoFondo: $tipoFondo
    dataFondo: $dataFondo
  })
}

mutation AgregarCuestionarioArchivo($archivoId: UUID!, $tituloQuiz: String!) @auth(level: PUBLIC, insecureReason: "Student publication quiz") {
  cuestionario_insert(data: { archivoId: $archivoId, tituloQuiz: $tituloQuiz })
}

mutation AgregarPreguntaCuestionario($cuestionarioId: UUID!, $enunciado: String!) @auth(level: PUBLIC, insecureReason: "Student publication quiz") {
  pregunta_insert(data: { cuestionarioId: $cuestionarioId, enunciado: $enunciado })
}

mutation AgregarRespuestaPregunta($preguntaId: UUID!, $textoOpcion: String!, $esCorrecta: Boolean!) @auth(level: PUBLIC, insecureReason: "Student publication quiz") {
  respuesta_insert(data: { preguntaId: $preguntaId, textoOpcion: $textoOpcion, esCorrecta: $esCorrecta })
}

mutation CrearUsuarioNuevo($alias: String!, $nombre: String!, $apellidoPaterno: String!, $apellidoMaterno: String!, $estadoValidacion: Boolean!, $estrellasPrestigio: Int!, $rachaActualDias: Int!, $numeroCelular: String!, $rolId: UUID!, $ultimaActividad: Timestamp!, $curso: String, $paralelo: String, $nombreColegio: String, $avatarId: UUID, $nivelId: UUID, $horaNotificacion: String) @auth(level: PUBLIC, insecureReason: "Safe for custom user registration during development") {
  usuario_insert(data: {alias: $alias, nombre: $nombre, apellidoPaterno: $apellidoPaterno, apellidoMaterno: $apellidoMaterno, estadoValidacion: $estadoValidacion, estrellasPrestigio: $estrellasPrestigio, rachaActualDias: $rachaActualDias, numeroCelular: $numeroCelular, rolId: $rolId, ultimaActividad: $ultimaActividad, curso: $curso, paralelo: $paralelo, nombreColegio: $nombreColegio, horaNotificacion: $horaNotificacion, avatarId: $avatarId, nivelId: $nivelId})
}

mutation ActualizarUsuarioPerfil($id: UUID!, $alias: String!, $nombre: String!, $apellidoPaterno: String!, $apellidoMaterno: String!, $numeroCelular: String!, $curso: String, $paralelo: String, $nombreColegio: String, $rolId: UUID!, $avatarId: UUID, $horaNotificacion: String) @auth(level: PUBLIC, insecureReason: "Safe for custom user update") {
  usuario_update(id: $id, data: {alias: $alias, nombre: $nombre, apellidoPaterno: $apellidoPaterno, apellidoMaterno: $apellidoMaterno, numeroCelular: $numeroCelular, curso: $curso, paralelo: $paralelo, nombreColegio: $nombreColegio, rolId: $rolId, avatarId: $avatarId, horaNotificacion: $horaNotificacion})
}

mutation ActualizarRachaUsuario($id: UUID!, $racha: Int!, $ultimaActividad: Timestamp!) @auth(level: PUBLIC, insecureReason: "Safe for user action tracking") {
  usuario_update(id: $id, data: {rachaActualDias: $racha, ultimaActividad: $ultimaActividad})
}

query ListarRoles @auth(level: PUBLIC, insecureReason: "Roles are public to show in registration") {
  rolUsuarios {
    id
    nombreRol
  }
}

mutation SeedRolesData @auth(level: PUBLIC, insecureReason: "Seed data for development") {
  rolUsuario_insertMany(data: [
    { nombreRol: "Estudiante" },
    { nombreRol: "Docente" }
  ])
}

query ObtenerUsuarioPorId($id: UUID!) @auth(level: USER, insecureReason: "It is acceptable for logged-in users to fetch public profiles of other users.") {
  usuario(id: $id) {
    id
    alias
    nombre
    apellidoPaterno
    apellidoMaterno
    estadoValidacion
    estrellasPrestigio
    rachaActualDias
    numeroCelular
    rol {
      id
      nombreRol
    }
    ultimaActividad
  }
}

query ListarAvatares @auth(level: PUBLIC, insecureReason: "Avatars are public assets available for selection by anyone.") {
  opcionAvatars {
    id
    imagenUrl
    descripcion
  }
}

